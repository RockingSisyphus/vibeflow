name: Temporary VibeFlow paper fetch fast fixed

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  fetch-papers-fast-fixed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the pull request
        uses: actions/checkout@v4

      - name: Extract downloader and correct PDF signature validation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow_path = Path('.github/workflows/tmp-paper-fetch-fast-pr.yml')
          workflow_text = workflow_path.read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = workflow_text.index(start_marker) + len(start_marker)
          end = workflow_text.index(end_marker, start)
          embedded = workflow_text[start:end]
          script_lines = []
          for line in embedded.splitlines():
              script_lines.append(line[10:] if line.startswith('          ') else line)
          script = '\n'.join(script_lines) + '\n'
          script = script.replace("path.read_bytes()[:5] == b'%PDF'", "path.read_bytes()[:4] == b'%PDF'")
          script_path = Path('/tmp/vibeflow_paper_fetch_fast_fixed.py')
          script_path.write_text(script, encoding='utf-8')
          print(f'Extracted corrected downloader to {script_path}')
          PY
          python /tmp/vibeflow_paper_fetch_fast_fixed.py
          find artifact/papers -type f -maxdepth 1 -exec file {} \;
          du -sh artifact

      - name: Upload corrected paper corpus
        uses: actions/upload-artifact@v4
        with:
          name: vibeflow-paper-corpus-fast-fixed
          path: artifact
          if-no-files-found: error
          compression-level: 6
          retention-days: 1
