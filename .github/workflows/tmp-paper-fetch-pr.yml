name: Temporary VibeFlow paper fetch for retrieval

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  fetch-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out the pull request
        uses: actions/checkout@v4

      - name: Extract and run the downloader
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow_path = Path('.github/workflows/tmp-paper-fetch.yml')
          workflow_text = workflow_path.read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = workflow_text.index(start_marker) + len(start_marker)
          end = workflow_text.index(end_marker, start)
          embedded = workflow_text[start:end]
          script_lines = []
          for line in embedded.splitlines():
              script_lines.append(line[10:] if line.startswith('          ') else line)
          script_path = Path('/tmp/vibeflow_paper_fetch.py')
          script_path.write_text('\n'.join(script_lines) + '\n', encoding='utf-8')
          print(f'Extracted downloader to {script_path}')
          PY
          python /tmp/vibeflow_paper_fetch.py
          find artifact -maxdepth 3 -type f -print
          du -sh artifact

      - name: Upload paper corpus
        uses: actions/upload-artifact@v4
        with:
          name: vibeflow-paper-corpus-pr
          path: artifact
          if-no-files-found: error
          compression-level: 6
          retention-days: 1
