name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e . pytest
      - name: Compile Python files
        run: python -m compileall -q src tests examples
      - name: Run tests
        run: python -m pytest -q
      - name: Run integration sandbox
        run: PYTHONPATH=src python examples/integration_sandbox/run_all.py
      - name: Run quality check
        run: >
          PYTHONPATH=src python -m vibeflow quality-check --path src/vibeflow
          --enable-structure-limits
          --warn-root-code-files 150
          --max-root-code-files 200
          --warn-code-dirs 16
          --max-code-dirs 24
          --warn-code-files-per-dir 20
          --max-code-files-per-dir 30
          --warn-code-dir-depth 4
          --max-code-dir-depth 5
          --warn-child-code-dirs-per-dir 6
          --max-child-code-dirs-per-dir 10
          --warn-root-level-code-files 110
          --max-root-level-code-files 120
