              ("SWE-bench_GitHub_README.md", "https://raw.githubusercontent.com/SWE-bench/SWE-bench/main/README.md"),
              ("SWE-bench_HuggingFace_Dataset_Card.md", "https://huggingface.co/datasets/SWE-bench/SWE-bench/raw/main/README.md"),
              ("RepoBench_GitHub_README.md", "https://raw.githubusercontent.com/Leolty/repobench/main/README.md"),
              ("HumanEval_GitHub_README.md", "https://raw.githubusercontent.com/openai/human-eval/master/README.md"),
              ("SWE-Lancer_GitHub_README.md", "https://raw.githubusercontent.com/openai/SWELancer-Benchmark/main/README.md"),
              ("Flow2Code_GitHub_README.md", "https://raw.githubusercontent.com/hml-github/Flow2Code/main/README.md"),
              ("SWE-agent_GitHub_README.md", "https://raw.githubusercontent.com/SWE-agent/SWE-agent/main/README.md"),
              ("fuck-u-code_GitHub_README.md", "https://raw.githubusercontent.com/Done-0/fuck-u-code/main/README.md"),
              ("Graphify_GitHub_README.md", "https://raw.githubusercontent.com/Graphify-Labs/graphify/v8/README.md"),
              ("SWE-bench_Verified_OpenAI.html", "https://openai.com/index/introducing-swe-bench-verified/"),
          ]

          def run_curl(url: str, output: Path, accept: str | None = None) -> tuple[bool, str]:
              command = [
                  "curl", "-fL", "--retry", "4", "--retry-all-errors", "--retry-delay", "3",
                  "--connect-timeout", "30", "--max-time", "420", "-A", USER_AGENT,
              ]
              if accept:
                  command.extend(["-H", f"Accept: {accept}"])
              command.extend(["-o", str(output), url])
              result = subprocess.run(command, text=True, capture_output=True)
              if result.returncode == 0:
                  return True, ""
              return False, (result.stderr or result.stdout)[-1200:]

          def is_pdf(path: Path) -> bool:
              if not path.exists() or path.stat().st_size < 4096:
                  return False
              with path.open("rb") as handle:
                  return handle.read(5) == b"%PDF"

          def json_get(url: str) -> dict[str, Any] | None:
              request = urllib.request.Request(url, headers={"User-Agent": USER_AGENT, "Accept": "application/json"})
              for attempt in range(3):
                  try:
                      with urllib.request.urlopen(request, timeout=60) as response:
                          return json.loads(response.read().decode("utf-8"))
                  except Exception:
                      if attempt < 2:
                          time.sleep(2 + attempt * 2)
              return None

          def discover_open_pdf(doi: str) -> list[str]:
              candidates: list[str] = []
              encoded = urllib.parse.quote(doi, safe="")
              openalex = json_get(f"https://api.openalex.org/works/https://doi.org/{doi}")
              if openalex:
                  for key in ("best_oa_location", "primary_location"):
                      location = openalex.get(key) or {}
                      if location.get("pdf_url"):
                          candidates.append(location["pdf_url"])
                  for location in openalex.get("locations") or []:
                      if location.get("pdf_url"):
                          candidates.append(location["pdf_url"])
              unpaywall = json_get(f"https://api.unpaywall.org/v2/{encoded}?email=vibeflow.research@example.com")
              if unpaywall:
                  for key in ("best_oa_location", "first_oa_location"):
                      location = unpaywall.get(key) or {}
                      if location.get("url_for_pdf"):
                          candidates.append(location["url_for_pdf"])
              semantic = json_get(f"https://api.semanticscholar.org/graph/v1/paper/DOI:{doi}?fields=title,openAccessPdf")
              if semantic and (semantic.get("openAccessPdf") or {}).get("url"):
                  candidates.append(semantic["openAccessPdf"]["url"])
              seen: set[str] = set()
              return [item for item in candidates if item and not (item in seen or seen.add(item))]

          results: list[dict[str, Any]] = []
          for paper in papers:
              destination = PAPERS / paper["filename"]
              urls = list(paper.get("urls") or [])
              if not urls and paper.get("doi"):
                  urls.extend(discover_open_pdf(paper["doi"]))
              success = False
              used_url = ""
              errors: list[str] = []
              for url in urls:
                  partial = destination.with_suffix(destination.suffix + ".part")
                  ok, error = run_curl(url, partial, "application/pdf")
                  if ok and is_pdf(partial):
                      partial.replace(destination)
                      success = True
                      used_url = url
                      break
                  if partial.exists():
                      partial.unlink()
                  errors.append(f"{url}: {error or 'not a valid PDF'}")
              official_url = ""
              if paper.get("doi"):
                  official_url = f"https://doi.org/{paper['doi']}"
              elif paper.get("arxiv"):
                  official_url = f"https://arxiv.org/abs/{paper['arxiv']}"
              if official_url:
                  landing_name = f"{paper['id']:02d}_official_landing.html"
                  run_curl(official_url, DOCS / landing_name, "text/html")
              results.append({
                  **{key: value for key, value in paper.items() if key != "urls"},
                  "status": "downloaded" if success else "official_metadata_only",
                  "downloaded_from": used_url,
                  "size_bytes": destination.stat().st_size if success else 0,
                  "official_url": official_url,
                  "errors": errors,
              })

          doc_results: list[dict[str, Any]] = []
          for filename, url in official_docs:
              destination = DOCS / filename
              ok, error = run_curl(url, destination)
              doc_results.append({
                  "filename": filename,
                  "url": url,
                  "status": "downloaded" if ok and destination.exists() and destination.stat().st_size > 0 else "failed",
                  "size_bytes": destination.stat().st_size if destination.exists() else 0,
                  "error": error,
              })

          with (META / "papers_manifest.json").open("w", encoding="utf-8") as handle:
              json.dump(results, handle, ensure_ascii=False, indent=2)
          with (META / "official_docs_manifest.json").open("w", encoding="utf-8") as handle:
              json.dump(doc_results, handle, ensure_ascii=False, indent=2)

          with (META / "papers_manifest.csv").open("w", encoding="utf-8-sig", newline="") as handle:
              fieldnames = ["id", "category", "title", "year", "venue", "doi", "arxiv", "filename", "status", "size_bytes", "downloaded_from", "official_url"]
              writer = csv.DictWriter(handle, fieldnames=fieldnames, extrasaction="ignore")
              writer.writeheader()
              writer.writerows(results)

          checksum_lines: list[str] = []
          for path in sorted(ROOT.rglob("*")):
              if path.is_file() and path.name != "SHA256SUMS.txt":
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  checksum_lines.append(f"{digest}  {path.relative_to(ROOT).as_posix()}")
          (ROOT / "SHA256SUMS.txt").write_text("\n".join(checksum_lines) + "\n", encoding="utf-8")

          downloaded = [item for item in results if item["status"] == "downloaded"]
          missing = [item for item in results if item["status"] != "downloaded"]
          readme_lines = [
              "# VibeFlow 相关论文与官方资料包",
              "",
              "本资料包依据深度研究报告中的核心论文、经典软件工程支撑文献、实验设计涉及的基准论文，以及用户原始问题点名的相近基准整理。",
              "",
              f"- 论文条目总数：{len(results)}",
              f"- 已下载并验证 PDF 文件头的论文：{len(downloaded)}",
              f"- 未找到可公开直接下载 PDF、仅保留正式元数据/落地页的论文：{len(missing)}",
              f"- 已成功保存的官方说明页面：{sum(1 for item in doc_results if item['status'] == 'downloaded')}",
              "",
              "## 目录结构",
              "",
              "- `papers/`：公开可获取的论文 PDF。",
              "- `official_docs/`：出版社/预印本落地页与官方项目说明。",
              "- `metadata/`：JSON/CSV 机器可读清单。",
              "- `SHA256SUMS.txt`：全部文件校验值。",
              "",
              "## 未直接取得公开 PDF 的论文",
              "",
          ]
          if missing:
              for item in missing:
                  readme_lines.append(f"- {item['title']} — {item['official_url'] or '无可用正式链接'}")
          else:
              readme_lines.append("- 无。")
          readme_lines.extend([
              "",
              "## 使用说明",
              "",
              "PDF 均从论文作者、arXiv、ACL Anthology、官方机构保存稿或开放获取索引返回的来源下载，并以 `%PDF` 文件头和最小文件大小进行自动验证。正式出版信息以 DOI 页面为准。",
          ])
          (ROOT / "README_资料包说明.md").write_text("\n".join(readme_lines) + "\n", encoding="utf-8")

          print(json.dumps({
              "papers_total": len(results),
              "pdf_downloaded": len(downloaded),
              "metadata_only": len(missing),
              "official_docs_downloaded": sum(1 for item in doc_results if item["status"] == "downloaded"),
          }, ensure_ascii=False, indent=2))
          PY

          find artifact -type f -maxdepth 3 -print0 | xargs -0 file
          du -sh artifact

      - name: Upload paper corpus
        uses: actions/upload-artifact@v4
        with:
          name: vibeflow-paper-corpus
          path: artifact
          if-no-files-found: error
          compression-level: 6
          retention-days: 1
